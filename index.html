<script type="text/javascript">
function ssSorgu() {
  var API = 'https://script.google.com/macros/s/AKfycbzj3xWcSksuzDMzDmp7hbzAXFAGgbzQQI5dSpIPHryifUol24RPLY0H-d5Uvn-PwFbf9w/exec';
  var input = document.getElementById('ss-certId');
  var out   = document.getElementById('ss-result');
  var btn   = document.getElementById('ss-btn');
  var query = input.value.trim();

  if (!query) {
    out.innerHTML = '<div class="ss-error"><span class="ss-error-text">Lütfen bir Sertifika ID girin.</span></div>';
    return;
  }

  btn.textContent = 'Sorgulanıyor...';
  btn.disabled = true;
  out.innerHTML = '';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', API, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      btn.textContent = 'Sorgula';
      btn.disabled = false;
      if (xhr.status === 200) {
        try {
          var rows = JSON.parse(xhr.responseText);
          var match = null;
          for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            var keys = Object.keys(row);
            for (var j = 0; j < keys.length; j++) {
              var k = keys[j];
              if (k === 'İD' || k === 'ID' || k === 'id' || k === 'Id' || k === 'İd') {
                if (String(row[k]).toLowerCase() === query.toLowerCase()) {
                  match = row; break;
                }
              }
            }
            if (match) break;
          }
          if (match) {
            var mkeys = Object.keys(match);
            var isimKey = '', tarihKey = '';
            for (var x = 0; x < mkeys.length; x++) {
              var mk = mkeys[x].toLowerCase();
              if (mk.indexOf('isim') > -1 || mk.indexOf('name') > -1) isimKey = mkeys[x];
              if (mk.indexOf('tarih') > -1 || mk.indexOf('date') > -1) tarihKey = mkeys[x];
            }
            var ad = match[isimKey] || 'Ad bulunamadı';
            var tarihStr = match[tarihKey] ? String(match[tarihKey]) : '';
            var tarihGoster = tarihStr ? ssFormatTarih(tarihStr) : '—';
            out.innerHTML = '<div class="ss-success">'
              + '<span class="ss-result-label">✓ Sertifika Doğrulandı</span>'
              + '<span class="ss-result-name">' + ad + '</span>'
              + '<span class="ss-result-date">Düzenlenme Tarihi: ' + tarihGoster + '</span>'
              + '<span class="ss-result-badge">★ Stella Sola Onaylı · ' + query + '</span>'
              + '</div>';
          } else {
            out.innerHTML = '<div class="ss-error"><span class="ss-error-text">"' + query + '" koduna sahip sertifika bulunamadı.</span></div>';
          }
        } catch(e) {
          out.innerHTML = '<div class="ss-error"><span class="ss-error-text">Hata: ' + e.message + '</span></div>';
        }
      } else {
        out.innerHTML = '<div class="ss-error"><span class="ss-error-text">Sunucuya ulaşılamadı (Hata: ' + xhr.status + ')</span></div>';
      }
    }
  };
  xhr.send();
}

function ssFormatTarih(s) {
  try {
    var d;
    if (s.indexOf('T') > -1) { d = new Date(s); }
    else if (s.indexOf('.') > -1) { var p = s.split('.'); d = new Date(p[2]+'-'+p[1]+'-'+p[0]); }
    else { d = new Date(s); }
    if (isNaN(d.getTime())) return s;
    return d.toLocaleDateString('tr-TR', {day:'numeric', month:'long', year:'numeric'});
  } catch(e) { return s; }
}
</script>
