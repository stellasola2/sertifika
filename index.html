<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sertifika Doğrulama · Stella Sola</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #faf8f4;
      --sand:    #e8e0d4;
      --gold:    #b8955a;
      --gold-lt: #d4b07a;
      --dark:    #1c1814;
      --mid:     #5a5248;
      --border:  rgba(184,149,90,0.25);
    }

    body {
      background: var(--cream);
      color: var(--dark);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 520px;
    }

    /* ── Header ── */
    .brand {
      text-align: center;
      margin-bottom: 3rem;
    }

    .brand-logo {
      display: inline-block;
      width: 48px; height: 48px;
      margin-bottom: 1rem;
    }

    .brand-logo svg { width: 100%; height: 100%; }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dark);
    }

    .brand-tagline {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.3rem;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2.5rem 2.5rem 3rem;
      position: relative;
    }

    /* corner ornaments */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold);
      border-style: solid;
    }
    .card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      font-style: italic;
      color: var(--dark);
      margin-bottom: 0.4rem;
    }

    .card-sub {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 2rem;
    }

    /* ── Form ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    input[type="text"] {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--sand);
      background: transparent;
      padding: 0.6rem 0;
      font-family: 'Jost', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--dark);
      outline: none;
      transition: border-color 0.3s;
      letter-spacing: 0.05em;
    }

    input[type="text"]:focus {
      border-bottom-color: var(--gold);
    }

    input[type="text"]::placeholder {
      color: var(--sand);
      font-size: 0.85rem;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 2rem;
      padding: 0.9rem 1rem;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { background: var(--gold); }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* spinner inside button */
    .btn .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    .btn.loading .spinner { display: inline-block; }
    .btn.loading .btn-text { opacity: 0.6; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result ── */
    #result { margin-top: 2rem; }

    .result-box {
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-success {
      border-left: 3px solid var(--gold);
      padding: 1.5rem 1.5rem 1.5rem 2rem;
      background: #fefcf8;
    }

    .result-label {
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.8rem;
    }

    .result-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--dark);
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    .result-date {
      font-size: 0.78rem;
      color: var(--mid);
      letter-spacing: 0.1em;
    }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 1.2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .result-badge svg {
      width: 14px; height: 14px;
    }

    .result-error {
      border-left: 3px solid #c0392b;
      padding: 1rem 1rem 1rem 1.5rem;
      background: #fff8f8;
    }

    .result-error p {
      font-size: 0.82rem;
      color: #8b2020;
      line-height: 1.6;
    }

    .divider {
      width: 40px; height: 1px;
      background: var(--gold);
      margin: 2.5rem auto;
      opacity: 0.4;
    }

    .footer-note {
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="brand">
      <!-- Minimal star/sun logomark -->
      <div class="brand-logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="8" stroke="#b8955a" stroke-width="1"/>
          <circle cx="24" cy="24" r="14" stroke="#b8955a" stroke-width="0.5" stroke-dasharray="2 3"/>
          <line x1="24" y1="2"  x2="24" y2="10" stroke="#b8955a" stroke-width="0.8"/>
          <line x1="24" y1="38" x2="24" y2="46" stroke="#b8955a" stroke-width="0.8"/>
          <line x1="2"  y1="24" x2="10" y2="24" stroke="#b8955a" stroke-width="0.8"/>
          <line x1="38" y1="24" x2="46" y2="24" stroke="#b8955a" stroke-width="0.8"/>
          <line x1="7.4"  y1="7.4"  x2="13.1" y2="13.1" stroke="#b8955a" stroke-width="0.8"/>
          <line x1="34.9" y1="34.9" x2="40.6" y2="40.6" stroke="#b8955a" stroke-width="0.8"/>
          <line x1="40.6" y1="7.4"  x2="34.9" y2="13.1" stroke="#b8955a" stroke-width="0.8"/>
          <line x1="13.1" y1="34.9" x2="7.4"  y2="40.6" stroke="#b8955a" stroke-width="0.8"/>
          <circle cx="24" cy="24" r="3" fill="#b8955a"/>
        </svg>
      </div>
      <div class="brand-name">Stella Sola</div>
      <div class="brand-tagline">Sertifika Doğrulama</div>
    </div>

    <div class="card">
      <div class="card-title">Sertifikanızı Doğrulayın</div>
      <div class="card-sub">Sertifika kimlik kodunuzu girerek geçerliliğini teyit edin</div>

      <div class="field">
        <label for="certId">Sertifika ID</label>
        <input
          type="text"
          id="certId"
          placeholder="örn: SS-2024-00142"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <button class="btn" id="queryBtn" onclick="queryCertificate()">
        <span class="spinner"></span>
        <span class="btn-text">Sorgula</span>
      </button>

      <div id="result"></div>
    </div>

    <div class="divider"></div>
    <div class="footer-note">© Stella Sola · Tüm hakları saklıdır</div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzj3xWcSksuzDMzDmp7hbzAXFAGgbzQQI5dSpIPHryifUol24RPLY0H-d5Uvn-PwFbf9w/exec';

    // ─── Ana sorgu fonksiyonu ────────────────────────────────────────
    async function queryCertificate() {
      const input = document.getElementById('certId');
      const btn   = document.getElementById('queryBtn');
      const out   = document.getElementById('result');
      const query = input.value.trim();

      if (!query) {
        showError('Lütfen bir Sertifika ID girin.', out);
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;
      btn.querySelector('.btn-text').textContent = 'Sorgulanıyor…';
      out.innerHTML = '';

      try {
        const res = await fetch(SCRIPT_URL);
        if (!res.ok) throw new Error('Sunucuya ulaşılamadı.');
        const rows = await res.json();

        const match = rows.find(row => {
          const idKey = Object.keys(row).find(k =>
            k.toLowerCase().replace('i','i').includes('id') ||
            k === 'İD' || k === 'ID' || k === 'id' || k === 'İd'
          );
          return idKey && String(row[idKey]).toLowerCase() === query.toLowerCase();
        });

        if (match) {
          const isimKey = Object.keys(match).find(k =>
            k === 'İsim' || k === 'isim' || k === 'İSİM' ||
            k.toLowerCase().includes('name') || k.toLowerCase().includes('ad')
          );
          const tarihKey = Object.keys(match).find(k =>
            k === 'Tarih' || k === 'tarih' || k === 'TARİH' ||
            k.toLowerCase().includes('date')
          );
          showSuccess(match[isimKey], match[tarihKey], query, out);
        } else {
          showError(
            `"<strong>${escHtml(query)}</strong>" koduna sahip bir sertifika bulunamadı.<br>
             Lütfen kodu kontrol edip tekrar deneyin.`,
            out
          );
        }
      } catch (err) {
        showError('Bağlantı hatası: ' + err.message, out);
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
        btn.querySelector('.btn-text').textContent = 'Sorgula';
      }
    }

    // ─── Çıktı yardımcıları ─────────────────────────────────────────
    function showSuccess(name, date, id, container) {
      const displayName = name || 'Ad bilgisi bulunamadı';
      const displayDate = date ? formatDate(date) : '—';

      container.innerHTML = `
        <div class="result-box result-success">
          <div class="result-label">✓ Sertifika Doğrulandı</div>
          <div class="result-name">${escHtml(displayName)}</div>
          <div class="result-date">Düzenlenme Tarihi: ${escHtml(displayDate)}</div>
          <div class="result-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
            </svg>
            Stella Sola Onaylı · ${escHtml(id)}
          </div>
        </div>`;
    }

    function showError(msg, container) {
      container.innerHTML = `
        <div class="result-box result-error">
          <p>${msg}</p>
        </div>`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(str) {
      // DD.MM.YYYY veya YYYY-MM-DD formatlarını dene
      const d = new Date(str.includes('.') ? str.split('.').reverse().join('-') : str);
      if (isNaN(d)) return str;
      return d.toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
    }

    // Enter tuşu ile sorgulama
    document.getElementById('certId').addEventListener('keydown', e => {
      if (e.key === 'Enter') queryCertificate();
    });
  </script>
</body>
</html>
