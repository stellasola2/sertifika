<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sertifika Doğrulama · Stella Sola</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #c0182a;
      --red-dk: #8f0f1e;
      --black:  #0e0e0e;
      --white:  #ffffff;
      --off:    #f7f7f7;
      --gray:   #6b6b6b;
      --border: rgba(192,24,42,0.2);
    }

    html, body {
      min-height: 100vh;
      background: var(--black);
      color: var(--white);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
    }

    /* background texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 80px,
          rgba(255,255,255,0.015) 80px,
          rgba(255,255,255,0.015) 81px
        );
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
    }

    /* ── Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fadeDown 0.8s ease both;
    }

    .brand-emblem {
      width: 56px; height: 56px;
      margin: 0 auto 1.2rem;
      position: relative;
    }

    .brand-emblem svg { width: 100%; height: 100%; }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--white);
      display: block;
    }

    .brand-line {
      width: 48px; height: 1px;
      background: var(--red);
      margin: 0.8rem auto;
    }

    .brand-sub {
      font-size: 0.62rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--red);
      display: block;
    }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 500px;
      background: var(--white);
      color: var(--black);
      position: relative;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    /* red top bar */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--red);
    }

    .card-inner { padding: 2.8rem 2.8rem 3rem; }

    .card-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 0.5rem;
      display: block;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      font-style: italic;
      color: var(--black);
      margin-bottom: 0.3rem;
      line-height: 1.2;
    }

    .card-desc {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--gray);
      margin-bottom: 2.2rem;
      display: block;
    }

    /* ── Input ── */
    .field { margin-bottom: 0; }

    .field-label {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gray);
      display: block;
      margin-bottom: 0.6rem;
    }

    .field-input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid #ddd;
      background: transparent;
      padding: 0.7rem 0;
      font-family: 'Raleway', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--black);
      outline: none;
      transition: border-color 0.3s;
      letter-spacing: 0.08em;
    }

    .field-input:focus { border-bottom-color: var(--red); }
    .field-input::placeholder { color: #ccc; font-size: 0.88rem; }

    /* ── Button ── */
    .btn {
      display: block; width: 100%;
      margin-top: 2rem; padding: 1rem;
      background: var(--black);
      color: var(--white);
      font-family: 'Raleway', sans-serif;
      font-size: 0.68rem; font-weight: 500;
      letter-spacing: 0.4em; text-transform: uppercase;
      border: none; cursor: pointer;
      transition: background 0.3s;
      position: relative; overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute; left: 0; bottom: 0;
      width: 0; height: 3px;
      background: var(--red);
      transition: width 0.3s;
    }

    .btn:hover { background: var(--red-dk); }
    .btn:hover::after { width: 100%; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-inner { display: flex; align-items: center; justify-content: center; gap: 10px; }

    .spinner {
      display: none;
      width: 13px; height: 13px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result ── */
    #ss-result { margin-top: 2rem; }

    .result-box { animation: fadeUp 0.4s ease both; }

    /* success */
    .result-success {
      background: var(--off);
      border-left: 4px solid var(--red);
      padding: 1.8rem 2rem;
    }

    .result-verified {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 1.4rem;
    }

    .verified-icon {
      width: 28px; height: 28px; flex-shrink: 0;
    }

    .verified-text {
      font-size: 0.6rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--red);
      font-weight: 500;
    }

    .result-name {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 700;
      color: var(--black); line-height: 1.1;
      margin-bottom: 0.3rem; display: block;
    }

    .result-urun {
      font-size: 0.78rem; color: var(--red);
      letter-spacing: 0.1em; text-transform: uppercase;
      font-weight: 500; display: block;
      margin-bottom: 1rem;
    }

    .result-divider {
      width: 32px; height: 1px;
      background: #ddd; margin-bottom: 1rem;
    }

    .result-meta {
      font-size: 0.72rem; color: var(--gray);
      letter-spacing: 0.08em; display: block;
      margin-bottom: 0.3rem;
    }

    .result-id {
      font-size: 0.62rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gray);
      display: flex; align-items: center; gap: 6px;
      margin-top: 1.2rem; padding-top: 1.2rem;
      border-top: 1px solid #e5e5e5;
    }

    .result-id-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red); flex-shrink: 0;
    }

    /* error */
    .result-error {
      background: #fff5f5;
      border-left: 4px solid #e53e3e;
      padding: 1.2rem 1.5rem;
    }

    .result-error p {
      font-size: 0.82rem; color: #c53030; line-height: 1.6;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      animation: fadeUp 0.8s 0.4s ease both;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card-inner { padding: 2rem 1.5rem 2.5rem; }
      .result-name { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-emblem">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- outer ring -->
          <circle cx="28" cy="28" r="26" stroke="#c0182a" stroke-width="0.8" stroke-dasharray="3 4"/>
          <!-- inner ring -->
          <circle cx="28" cy="28" r="16" stroke="white" stroke-width="0.6"/>
          <!-- rays -->
          <line x1="28" y1="2"  x2="28" y2="10" stroke="#c0182a" stroke-width="1.2"/>
          <line x1="28" y1="46" x2="28" y2="54" stroke="#c0182a" stroke-width="1.2"/>
          <line x1="2"  y1="28" x2="10" y2="28" stroke="#c0182a" stroke-width="1.2"/>
          <line x1="46" y1="28" x2="54" y2="28" stroke="#c0182a" stroke-width="1.2"/>
          <line x1="8"  y1="8"  x2="14" y2="14" stroke="#c0182a" stroke-width="0.8"/>
          <line x1="42" y1="42" x2="48" y2="48" stroke="#c0182a" stroke-width="0.8"/>
          <line x1="48" y1="8"  x2="42" y2="14" stroke="#c0182a" stroke-width="0.8"/>
          <line x1="14" y1="42" x2="8"  y2="48" stroke="#c0182a" stroke-width="0.8"/>
          <!-- center -->
          <circle cx="28" cy="28" r="4" fill="#c0182a"/>
          <circle cx="28" cy="28" r="2" fill="white"/>
        </svg>
      </div>
      <span class="brand-name">Stella Sola</span>
      <div class="brand-line"></div>
      <span class="brand-sub">Sertifika Doğrulama Sistemi</span>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-inner">
        <span class="card-eyebrow">Resmi Doğrulama</span>
        <div class="card-title">Sertifikanızı Doğrulayın</div>
        <span class="card-desc">Size verilen sertifika kodunu girerek geçerliliğini teyit edin</span>

        <div class="field">
          <span class="field-label">Sertifika ID</span>
          <input type="text" id="ss-certId" class="field-input" placeholder="örn: sero001" autocomplete="off" spellcheck="false" />
        </div>

        <button type="button" id="ss-btn" class="btn">
          <span class="btn-inner">
            <span class="spinner"></span>
            <span class="btn-text">Sorgula</span>
          </span>
        </button>

        <div id="ss-result"></div>
      </div>
    </div>

    <div class="footer">© 2026 Stella Sola · Tüm Hakları Saklıdır</div>
  </div>

  <script>
  (function() {
    var API = 'https://script.google.com/macros/s/AKfycbzj3xWcSksuzDMzDmp7hbzAXFAGgbzQQI5dSpIPHryifUol24RPLY0H-d5Uvn-PwFbf9w/exec';

    function ssSorgu() {
      var input = document.getElementById('ss-certId');
      var btn   = document.getElementById('ss-btn');
      var out   = document.getElementById('ss-result');
      var query = input.value.trim();

      if (!query) {
        out.innerHTML = '<div class="result-box result-error"><p>Lütfen bir Sertifika ID girin.</p></div>';
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;
      btn.querySelector('.btn-text').textContent = 'Sorgulanıyor…';
      out.innerHTML = '';

      var xhr = new XMLHttpRequest();
      xhr.open('GET', API, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        btn.classList.remove('loading');
        btn.disabled = false;
        btn.querySelector('.btn-text').textContent = 'Sorgula';

        if (xhr.status === 200) {
          try {
            var rows = JSON.parse(xhr.responseText);
            var match = null;
            for (var i = 0; i < rows.length; i++) {
              var row = rows[i];
              var keys = Object.keys(row);
              for (var j = 0; j < keys.length; j++) {
                var k = keys[j];
                if (k==='İD'||k==='ID'||k==='id'||k==='İd') {
                  if (String(row[k]).toLowerCase() === query.toLowerCase()) {
                    match = row; break;
                  }
                }
              }
              if (match) break;
            }

            if (match) {
              var isim  = match['İsim']  || match['isim']  || match['Ad']   || match['ad']   || '';
              var urun  = match['Ürün']  || match['ürün']  || match['Urun'] || match['urun'] || '';
              var tarih = match['Tarih'] || match['tarih'] || '';

              if (tarih) {
                try {
                  var d = tarih.indexOf('T') > -1
                    ? new Date(tarih)
                    : new Date(tarih.split('.').reverse().join('-'));
                  if (!isNaN(d.getTime()))
                    tarih = d.toLocaleDateString('tr-TR', {day:'numeric', month:'long', year:'numeric'});
                } catch(e) {}
              }

              out.innerHTML =
                '<div class="result-box result-success">'
                + '<div class="result-verified">'
                +   '<svg class="verified-icon" viewBox="0 0 28 28" fill="none">'
                +     '<circle cx="14" cy="14" r="13" fill="#c0182a"/>'
                +     '<path d="M7 14.5l4.5 4.5 9.5-10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
                +   '</svg>'
                +   '<span class="verified-text">Sertifika Doğrulandı</span>'
                + '</div>'
                + '<span class="result-name">' + isim + '</span>'
                + (urun ? '<span class="result-urun">' + urun + '</span>' : '')
                + '<div class="result-divider"></div>'
                + '<span class="result-meta">Başlangıç Tarihi: ' + (tarih || '—') + '</span>'
                + '<div class="result-id"><div class="result-id-dot"></div>Stella Sola Onaylı &nbsp;·&nbsp; ' + query + '</div>'
                + '</div>';
            } else {
              out.innerHTML = '<div class="result-box result-error"><p>"' + query + '" koduna sahip sertifika bulunamadı. Lütfen kodu kontrol edip tekrar deneyin.</p></div>';
            }
          } catch(e) {
            out.innerHTML = '<div class="result-box result-error"><p>Hata: ' + e.message + '</p></div>';
          }
        } else {
          out.innerHTML = '<div class="result-box result-error"><p>Sunucuya ulaşılamadı. Lütfen tekrar deneyin.</p></div>';
        }
      };
      xhr.send();
    }

    function init() {
      var btn   = document.getElementById('ss-btn');
      var input = document.getElementById('ss-certId');
      if (!btn || btn._ready) return;
      btn._ready = true;
      btn.addEventListener('click', ssSorgu);
      btn.onclick = ssSorgu;
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.keyCode === 13) ssSorgu();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
    window.addEventListener('load', init);
    setTimeout(init, 300);
    setTimeout(init, 800);
  })();
  </script>
</body>
</html>
